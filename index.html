<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
		<title>ColdFusion Code Beautifier - Beautify Your Code Online</title>
		<meta name="description" content="Use our ColdFusion Code Beautifier tool to quickly and easily format your code.">
		<meta name="robots" content="index, follow">
		<meta name="theme-color" content="#28a745" media="(prefers-color-scheme: light)">
		<meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)">
		<meta name="color-scheme" content="light dark">

		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="apple-mobile-web-app-title" content="CF Beautifier">
		<meta name="format-detection" content="telephone=no">

		<meta property="og:title" content="ColdFusion Code Beautifier">
		<meta property="og:description" content="Beautify your ColdFusion code with our online tool.">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://yapweijun1996.github.io/ColdFusion-Code-Beautifier/">
		<meta property="og:image" content="https://yapweijun1996.github.io/ColdFusion-Code-Beautifier/og_img.jpg">

		<link rel="icon" type="image/svg+xml" href="./favicon.svg">
		<link rel="apple-touch-icon" href="./favicon.svg">
		<link rel="manifest" href="./manifest.webmanifest">

		<link rel="stylesheet" href="./styles.css">
	</head>
	<body>
		<div class="simpleToastContainer"></div>
		<div class="container">
			<h1>ColdFusion Code Beautifier</h1>

			<div class="editor-grid">
				<section class="pane">
					<label class="pane-label" for="input">Input</label>
					<textarea id="input" placeholder="Paste your code here..." spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
				</section>

				<section class="pane">
					<label class="pane-label" for="output">Output</label>
					<textarea id="output" readonly placeholder="Your beautified code will appear here..." spellcheck="false"></textarea>
				</section>
			</div>

			<div class="toolbar">
				<label class="language-control" title="SQL formatter works best with standalone queries. Complex procedures may require manual adjustment.">
					<span>Language</span>
					<select id="language" class="lang-select">
						<option value="auto">Auto</option>
						<option value="cfml">CFML / HTML</option>
						<option value="sql">SQL</option>
						<option value="js">JavaScript</option>
					</select>
				</label>
				<button id="beautify" class="btn-primary" onclick="beautifyCodes()">Beautify</button>
				<button id="copy" class="btn-secondary" onclick="copy_output_data();">Copy</button>
				<button id="clear" class="btn-ghost" onclick="clear_data();">Clear</button>

				<div class="toolbar-options">
					<label><input type="checkbox" id="split_html_tag" value="y"> Split &lt;tag&gt;&lt;tag&gt;</label>
					<label title="Convert leading spaces to tabs before formatting. Auto-detects indent unit (e.g. 2, 4, or 8 spaces = 1 tab). Use when your file mixes space-indent and tab-indent lines."><input type="checkbox" id="normalize_indent" value="y"> Normalize Indent</label>
					<label class="normalize-tab-width" title="How many spaces equal one tab in the source file (Auto = detect from file)">
						<select id="normalize_tab_width" class="lang-select">
							<option value="0">Auto</option>
							<option value="2">2 sp</option>
							<option value="4">4 sp</option>
							<option value="8">8 sp</option>
						</select>
					</label>
					<label><input type="checkbox" id="auto_copy" value="y" checked> Auto copy</label>
					<label><input type="checkbox" id="auto_clear" value="y" checked> Auto clear input</label>
					<label><input type="checkbox" id="auto_clear_output" value="y" checked> Auto clear output</label>
					<label title="Safe Mode — disables Deep SQL / Deep CSS / Deep JS / Pro SQL in one click. Only the proven whitespace-only CFML auto-split + indent pipeline runs. Use for sensitive code where you cannot tolerate any content-shaped change. See docs/SAFETY.md."><input type="checkbox" id="safe_mode" value="y"> Safe Mode</label>
					<label title="Formats SQL inside <cfquery>"><input type="checkbox" id="deep_sql" value="y" checked> Deep SQL</label>
					<label title="Formats CSS inside <style>"><input type="checkbox" id="deep_css" value="y" checked> Deep CSS</label>
					<label title="Formats JS inside <script> — strings, templates, regex, and for-loop semicolons all protected"><input type="checkbox" id="deep_js" value="y" checked> Deep JS</label>
					<label title="Preserves visual column alignment of multi-line ternary / && / || / + / comma continuation lines inside <script> blocks (detect-and-anchor)"><input type="checkbox" id="preserve_continuation_alignment" value="y" checked> Preserve Cont Align</label>
					<label title="Experimental — uses a tree-sitter CFML parser (lazy-loads ~2.6 MB on first use) to indent flat, zero-indent multi-line &lt;cfset&gt;/&lt;cfparam&gt; nested function-call chains by their real call depth. Struct literals and SQL strings stay flat. Only fetches the grammar when such a block is present."><input type="checkbox" id="semantic_indent" value="y"> Semantic Indent</label>
					<label class="pro-sql" title="Use the dialect-aware sql-formatter library (~312KB, lazy-loaded on first use). Falls back to built-in formatter if the bundle fails to load."><input type="checkbox" id="pro_sql" value="y"> Pro SQL</label>
					<label class="pro-sql-dialect" title="SQL dialect for Pro SQL">
						<select id="pro_sql_dialect" class="lang-select">
							<option value="sql">Standard SQL</option>
							<option value="mysql">MySQL</option>
							<option value="mariadb">MariaDB</option>
							<option value="postgresql">PostgreSQL</option>
							<option value="sqlite">SQLite</option>
							<option value="tsql">SQL Server (T-SQL)</option>
							<option value="plsql">Oracle (PL/SQL)</option>
							<option value="db2">IBM DB2</option>
							<option value="redshift">Amazon Redshift</option>
							<option value="snowflake">Snowflake</option>
							<option value="bigquery">Google BigQuery</option>
							<option value="hive">Apache Hive</option>
							<option value="spark">Apache Spark</option>
							<option value="trino">Trino / Presto</option>
							<option value="n1ql">Couchbase N1QL</option>
							<option value="singlestoredb">SingleStoreDB</option>
						</select>
					</label>
				</div>
			</div>
		</div>
		<footer>
			<p>By <a href="https://github.com/yapweijun1996" target="_blank" rel="noopener">yapweijun1996</a> @ <span class="at_year"></span></p>
		</footer>
		<script src="./js/cf-tags.js"></script>
		<script src="./js/sql-keywords.js"></script>
		<script src="./js/sql-beautifier.js"></script>
		<script src="./js/js-lexer-utils.js"></script>
		<script src="./js/deep-format.js"></script>
		<script src="./js/tag-utils.js"></script>
		<script src="./js/cfml-splitter.js"></script>
		<script src="./js/toast.js"></script>
		<script src="./js/clipboard.js"></script>
		<script src="./js/pro-sql.js"></script>
		<script src="./js/tree-sitter-cfml.js"></script>
		<script src="./js/beautifier.js"></script>
		<script src="./js/app.js"></script>
		<script src="./js/pwa.js" defer></script>
	</body>
</html>
